name: Build RootAPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-25 build-tools;25.0.0'
        env:
          SKIP_JDK_VERSION_CHECK: 'true'
      
      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'GRADLE_PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
GRADLE_PROPS
          cat > gradlew << 'GRADLEW'
#!/bin/sh
set -e
APP_HOME=$( cd "${0%/*}" && pwd -P )
exec java -jar "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" "$@"
GRADLEW
          chmod +x gradlew
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar https://repo.maven.apache.org/maven2/org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar
      
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
