name: Build RootAPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.14_49/x64
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      run: |
        if [ -d "/opt/android-sdk" ]; then
          echo "Using preinstalled Android SDK"
          ls -la /opt/android-sdk/
          echo "sdk.dir=/opt/android-sdk" > $GITHUB_WORKSPACE/local.properties
        else
          mkdir -p /opt/android-sdk
          echo "sdk.dir=/opt/android-sdk" > $GITHUB_WORKSPACE/local.properties
        fi
        echo "ANDROID_HOME=$ANDROID_HOME"
        cat $GITHUB_WORKSPACE/local.properties
    
    - name: Build debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --warning-mode=all
      env:
        JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.14_49/x64
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
